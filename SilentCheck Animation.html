<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>SilentCheck — Présentation animée</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Orbitron:wght@400;500;600;700;800&family=Exo+2:wght@300;400;500;600&display=swap" />
<style>
  html, body, #root { margin: 0; padding: 0; height: 100%; background: #efe7d4; overflow: hidden; }
  body {
    font-family: 'Inter', system-ui, sans-serif; color: #f8fafc; -webkit-font-smoothing: antialiased;
    /* Lock the viewport so the mobile browser chrome showing/hiding doesn't
       resize the stage (which caused visible "jumps"). */
    position: fixed; inset: 0; width: 100%; height: 100%;
    overscroll-behavior: none; touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  * { box-sizing: border-box; }

  /* Mobile/tablet: blur-based effects (backdrop-filter, box/text shadows,
     SVG/CSS filters) are repainted every frame and overwhelm mobile GPUs,
     causing the stutter ("ça saute"). Disable them on touch / small screens
     to keep playback smooth — the layout and content stay intact. */
  @media (max-width: 1100px), (pointer: coarse) {
    * {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      box-shadow: none !important;
      text-shadow: none !important;
      filter: none !important;
    }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <!-- Mobile/tablet: play a pre-rendered video (smooth on any device) instead
       of the live React animation. Desktop keeps the interactive version. -->
  <video id="sc-video" autoplay loop muted playsinline preload="auto"
         style="display:none; position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); background:#efe7d4;"></video>
  <script>
    (function () {
      var MOBILE = window.matchMedia('(max-width: 1100px)').matches || window.matchMedia('(pointer: coarse)').matches;
      window.__SC_MOBILE__ = MOBILE;
      if (!MOBILE) return;
      var v = document.getElementById('sc-video');
      v.src = 'assets/silentcheck.mp4';
      v.style.display = 'block';
      function fit() {
        var w = window.innerWidth, h = window.innerHeight;
        if (h > w) { v.style.width = h + 'px'; v.style.height = w + 'px'; v.style.transform = 'translate(-50%,-50%) rotate(90deg)'; }
        else { v.style.width = w + 'px'; v.style.height = h + 'px'; v.style.transform = 'translate(-50%,-50%)'; }
        v.style.objectFit = 'contain';
      }
      fit();
      window.addEventListener('resize', fit);
      window.addEventListener('orientationchange', fit);
      var play = function () { if (v.play) { var p = v.play(); if (p && p.catch) p.catch(function () {}); } };
      document.addEventListener('touchstart', play, { once: true });
      document.addEventListener('click', play, { once: true });
    })();
  </script>



  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="scenes/scene-shared.jsx"></script>
  <script type="text/babel" src="scenes/scenes-1-2.jsx"></script>
  <script type="text/babel" src="scenes/scenes-3-4.jsx"></script>
  <script type="text/babel" src="scenes/scenes-5-6.jsx"></script>
  <script type="text/babel" src="scenes/scenes-7-8.jsx"></script>
  <script type="text/babel" src="scenes/scenes-9-12.jsx"></script>
  <script type="text/babel" src="scenes/scene-13.jsx"></script>
  <script type="text/babel" src="scenes/scene-14.jsx"></script>
  <script type="text/babel" src="scenes/scene-12-pilot.jsx"></script>
  <script type="text/babel" src="scenes/scenes-service.jsx"></script>

  <script type="text/babel">
    // Full presentation — app & service-first arc.
    // Act 1: le point de départ (score) · Act 2: le moteur (science) ·
    // Act 3: la plateforme de service · Act 4: intelligence & confiance.
    const TOTAL = 418;

    function TimestampLabel() {
      const t = useTime();
      React.useEffect(() => {
        const root = document.querySelector('[data-video-root]');
        if (root) root.setAttribute('data-screen-label', `t=${t.toFixed(1)}s`);
      }, [Math.floor(t)]);
      return null;
    }

    function App() {
      return (
        <div data-video-root data-screen-label="t=0s" style={{ position: 'absolute', inset: 0 }}>
          <Stage width={1920} height={1080} duration={TOTAL} background="#efe7d4" persistKey="silentcheck-anim">
            <TimestampLabel />
            {/* Act 1 — Le point de départ */}
            <Scene1Intro     start={0}     end={18}   />
            <Scene2Crisis    start={18}    end={38}   />
            <SceneStart      start={38}    end={58}   />
            {/* Act 2 — Le moteur : la science du Score BSD */}
            <Scene4Score     start={58}    end={80}   />
            <Scene3Heart     start={80}    end={100}  />
            <Scene5Bilans    start={100}   end={120}  />
            <Scene6Synergy   start={120}   end={140}  />
            <Scene13Exposome start={140}   end={162}  />
            {/* Act 3 — La plateforme de service */}
            <Scene14Hub      start={162}   end={186}  />
            <SceneServices   start={186}   end={208}  />
            <SceneConcierge  start={208}   end={230}  />
            <SceneHumans     start={230}   end={248}  />
            <SceneSecondAvis start={248}   end={270}  />
            <SceneBusinessModel start={270} end={290} />
            <Scene9Mockups   start={290}   end={308}  />
            <Scene7Journey   start={308}   end={326}  />
            {/* Act 4 — Intelligence & confiance */}
            <Scene10Bilan    start={326}   end={348}  />
            <Scene11Security start={348}   end={368}  />
            <Scene12Authors  start={368}   end={402}  />
            <Scene8Outro     start={402}   end={418}  />
            {/* Global immersive HUD — rendered on top of every scene */}
            <ImmersiveHUD boundaries={[18, 38, 58, 80, 100, 120, 140, 162, 186, 208, 230, 248, 270, 290, 308, 326, 348, 368, 402]} />
          </Stage>
        </div>
      );
    }

    // On mobile/tablet we show the pre-rendered video instead of the live app.
    if (!window.__SC_MOBILE__) {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    }
  </script>
</body>
</html>
